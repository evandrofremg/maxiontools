<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxion Tools</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><text x='50' y='65' font-family='Arial, sans-serif' font-weight='900' font-size='42' fill='%232563eb' text-anchor='middle'>M</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><text x='50' y='65' font-family='Arial, sans-serif' font-weight='900' font-size='42' fill='%232563eb' text-anchor='middle'>M</text></svg>">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f1f5f9; color: #1e293b; padding-bottom: 30px; }
        
        header { background-color: #0f172a; color: white; padding: 18px; border-bottom: 4px solid #1e40af; text-align: center; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 2px; }
        .logo-text-bold { font-size: 24px; font-weight: 900; letter-spacing: 1.5px; color: #ffffff; }
        .logo-text-blue { color: #2563eb; }
        header p { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        
        .tab-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .btn-tab { padding: 12px 6px; border-radius: 8px; border: 2px solid #cbd5e1; background: white; font-weight: bold; font-size: 12px; cursor: pointer; text-align: center; color: #334155; }
        .btn-tab.active { background-color: #1e3a8a !important; color: white !important; border-color: #3b82f6 !important; }
        
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .card-title { font-size: 12px; font-weight: bold; color: #64748b; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #475569; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; background-color: #f8fafc; color: #334155; }
        .hidden { display: none !important; }
        
        .btn-primary { width: 100%; background-color: #2563eb; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-secondary { width: 100%; background-color: #64748b; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 12px; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-success { width: 100%; background-color: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 13px; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
        
        .bg-result { background-color: #0f172a; color: white; padding: 20px; border-radius: 15px; }
        .res-linha { font-size: 14px; margin-bottom: 10px; padding: 10px; background: #1e293b; border-radius: 6px; border-left: 4px solid #3b82f6; }
        .res-destaque { font-size: 20px; font-weight: bold; color: #34d399; margin-top: 15px; text-align: center; background: #1e3a8a; padding: 15px; border-radius: 8px; }
        
        @media print {
            body { background: white; color: black; padding: 0; }
            header, .tab-container, .card:not(.bg-result), .btn-primary, .btn-secondary, .btn-success { display: none !important; }
            .container { max-width: 100%; width: 100%; padding: 0; margin: 0; }
            .bg-result { background: white !important; color: black !important; padding: 0 !important; }
            .res-linha { background: #f8fafc !important; border: 1px solid #cbd5e1 !important; border-left: 5px solid #1e3a8a !important; color: black !important; margin-bottom: 12px; font-size: 13px; }
            .res-destaque { color: #16a34a !important; background: #f0fdf4 !important; border: 2px solid #bbf7d0 !important; font-size: 24px; padding: 20px; }
            .print-header { display: block !important; border-bottom: 3px solid #1e3a8a; padding-bottom: 12px; margin-bottom: 25px; }
            .print-footer { display: block !important; margin-top: 60px; border-top: 1px solid #cbd5e1; padding-top: 10px; text-align: center; font-size: 10px; color: #64748b; }
            .signature-area { display: flex !important; justify-content: space-between; margin-top: 80px; }
            .sig-line { width: 45%; border-top: 1px solid #000; text-align: center; padding-top: 6px; font-size: 12px; color: #334155; }
        }
        .print-header, .print-footer, .signature-area { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <span class="logo-text-bold">MAXION</span>
            <span class="logo-text-bold logo-text-blue">TOOLS</span>
        </div>
        <p>Engenharia de Processos & Estamparia</p>
    </header>

    <div class="container">
        
        <!-- Abas Técnicas -->
        <div class="tab-container">
            <button type="button" id="tab-corte" class="btn-tab active" onclick="mudarAba('corte')">✂️ Corte</button>
            <button type="button" id="tab-dobra" class="btn-tab" onclick="mudarAba('dobra')">📐 Dobra V</button>
            <button type="button" id="tab-dobrau" class="btn-tab" onclick="mudarAba('dobrau')">🔄 Dobra U</button>
            <button type="button" id="tab-rosca" class="btn-tab" onclick="mudarAba('rosca')">🔩 Furo Rosca</button>
        </div>

        <!-- Inputs Dinâmicos -->
        <div class="card">
            <div class="card-title">Parâmetros de Entrada</div>
            
            <div id="inputs-mecanicos-gerais">
                <div class="form-group">
                    <label>Material da Chapa</label>
                    <select id="material" class="form-control">
                        <option value="300">SAE 1010 (σt: 300 MPa)</option>
                        <option value="400" selected>SAE 1020 (σt: 400 MPa)</option>
                        <option value="290">LNE 20 (σt: 290 MPa)</option>
                        <option value="340">LNE 28 (σt: 340 MPa)</option>
                        <option value="380">LNE 38 (σt: 380 MPa)</option>
                        <option value="500">LNE 50 (σt: 500 MPa)</option>
                        <option value="600">LNE 60 (σt: 600 MPa)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Espessura da Chapa (s) [mm]</label>
                    <input type="number" id="espessura" class="form-control" value="2.0">
                </div>
            </div>

            <!-- Grupo: Corte -->
            <div id="grupo-corte">
                <div class="form-group">
                    <label>Perímetro Total do Corte [mm]</label>
                    <input type="number" id="perimetro" class="form-control" value="80">
                </div>
            </div>

            <!-- Grupo: Dobra V -->
            <div id="grupo-dobra" class="hidden">
                <div class="form-group">
                    <label>Comprimento da Dobra (b) [mm]</label>
                    <input type="number" id="comprimento-dobra" class="form-control" value="100">
                </div>
                <div class="form-group">
                    <label>Abertura da Matriz V (W) [mm]</label>
                    <input type="number" id="abertura-v" class="form-control" value="16">
                </div>
            </div>

            <!-- Grupo: Dobra U -->
            <div id="grupo-dobrau" class="hidden">
                <div class="form-group">
                    <label>Comprimento da Dobra U (b) [mm]</label>
                    <input type="number" id="comprimento-dobrau" class="form-control" value="100">
                </div>
                <div class="form-group">
                    <label>Canal Interno da Matriz U (W) [mm]</label>
                    <input type="number" id="abertura-u" class="form-control" value="20">
                </div>
            </div>

            <!-- Grupo: Rosca -->
            <div id="grupo-rosca" class="hidden">
                <div class="form-group">
                    <label>Selecione a Rosca Desejada (Métrica)</label>
                    <select id="bitola-rosca" class="form-control">
                        <option value="2.5">M3 x 0.5 (Passo Normal)</option>
                        <option value="3.3">M4 x 0.7 (Passo Normal)</option>
                        <option value="4.2">M5 x 0.8 (Passo Normal)</option>
                        <option value="5.0">M6 x 1.0 (Passo Normal)</option>
                        <option value="6.8" selected>M8 x 1.25 (Passo Normal)</option>
                        <option value="8.5">M10 x 1.5 (Passo Normal)</option>
                        <option value="10.2">M12 x 1.75 (Passo Normal)</option>
                        <option value="12.0">M14 x 2.0 (Passo Normal)</option>
                        <option value="14.0">M16 x 2.0 (Passo Normal)</option>
                        <option value="15.5">M18 x 2.5 (Passo Normal)</option>
                        <option value="17.5">M20 x 2.5 (Passo Normal)</option>
